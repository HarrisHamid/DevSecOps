name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Deployment Commands on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 0. Install Git and Docker on the new Amazon Linux 2023 server
            sudo yum update -y
            sudo yum install git docker -y
            sudo systemctl start docker
            sudo systemctl enable docker

            # 1. Clone the repository if it doesn't exist, or pull the latest changes
            if [ ! -d "DevSecOps" ]; then
              git clone https://github.com/HarrisHamid/DevSecOps.git
            fi
            cd DevSecOps
            git pull origin main

            # 2. Move into the frontend folder where the Dockerfile lives
            cd frontend

            # 3. Build the new Docker image for the Vite frontend
            sudo docker build -t march-madness-app .

            # 4. Stop and remove the old container if it exists
            sudo docker stop march-madness-container || true
            sudo docker rm march-madness-container || true

            # 5. Run the new container and route its logs directly to CloudWatch
            # Note: awslogs-create-group=true ensures it doesn't crash on a fresh server
            sudo docker run -d \
              -p 80:5173 \
              --name march-madness-container \
              --log-driver=awslogs \
              --log-opt awslogs-region=us-east-1 \
              --log-opt awslogs-group=march-madness-docker-logs \
              --log-opt awslogs-create-group=true \
              march-madness-app