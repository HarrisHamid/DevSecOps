name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Deployment Commands on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: VITE_SUPABASE_URL,VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY
          script: |
            # 0. Install Git and Docker if missing
            sudo yum update -y
            sudo yum install -y git docker
            sudo systemctl start docker
            sudo systemctl enable docker

            # 1. Clone or pull latest code
            cd ~/marchmadnessproject
            if [ ! -d "DevSecOps" ]; then
              git clone https://github.com/HarrisHamid/DevSecOps.git
            fi
            cd DevSecOps
            git pull origin main

            # 2. Go to frontend
            cd frontend

            # 3. Build Docker image with env vars
            sudo docker build \
              --build-arg VITE_SUPABASE_URL=$VITE_SUPABASE_URL \
              --build-arg VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY=$VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY \
              -t march-madness-app .

            # 4. Stop and remove old container
            sudo docker stop march-madness-container || true
            sudo docker rm march-madness-container || true

            # 5. Run container
            sudo docker run -d \
              -p 3000:80 \
              --name march-madness-container \
              --log-driver=awslogs \
              --log-opt awslogs-region=us-east-1 \
              --log-opt awslogs-group=march-madness-docker-logs \
              --log-opt awslogs-create-group=true \
              march-madness-app

            # 6. Restart nginx
            sudo systemctl enable nginx
            sudo systemctl start nginx
            sudo systemctl reload nginx

        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}