name: Deploy to EC2
on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Build and Deploy to Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Deployment Commands on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: VITE_SUPABASE_URL,VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY
          script: |
            # 0. Install Git and Docker if missing
            sudo yum update -y
            sudo yum install git docker -y
            sudo systemctl start docker
            sudo systemctl enable docker

            # 1. Clone or pull latest code
            if [ ! -d "DevSecOps" ]; then
              git clone https://github.com/HarrisHamid/DevSecOps.git
            fi
            cd DevSecOps
            git pull origin main

            # 2. Write env file before building
            cd frontend
            cat > .env << EOF
            VITE_SUPABASE_URL=$VITE_SUPABASE_URL
            VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY=$VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY
            EOF

            # 3. Build Docker image
            sudo docker build -t march-madness-app .

            # 4. Stop and remove old container
            sudo docker stop march-madness-container || true
            sudo docker rm march-madness-container || true

            # 5. Run container on port 3000 (nginx proxies to it)
            sudo docker run -d \
              -p 3000:80 \
              --name march-madness-container \
              --log-driver=awslogs \
              --log-opt awslogs-region=us-east-1 \
              --log-opt awslogs-group=march-madness-docker-logs \
              --log-opt awslogs-create-group=true \
              march-madness-app

            # 6. Ensure nginx is running
            sudo systemctl enable nginx
            sudo systemctl start nginx
            sudo systemctl reload nginx