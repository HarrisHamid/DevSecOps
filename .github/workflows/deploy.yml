name: Deploy to EC2
on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Build and Deploy to Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Deployment Commands on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 0. Ensure dependencies are installed
            sudo yum update -y
            sudo yum install git nodejs npm -y

            # 1. Clone or pull latest code
            if [ ! -d "DevSecOps" ]; then
              git clone https://github.com/HarrisHamid/DevSecOps.git
            fi
            cd DevSecOps
            git pull origin main

            # 2. Build the Vite frontend
            cd frontend
            npm ci
            npm run build

            # 3. Deploy built files to the directory nginx is serving
            sudo rm -rf /var/www/html/marchmadness/dist
            sudo mkdir -p /var/www/html/marchmadness/dist
            sudo cp -r dist/. /var/www/html/marchmadness/dist/

            # 4. Ensure nginx is running (start it if it was ever stopped)
            sudo systemctl enable nginx
            sudo systemctl start nginx
            sudo systemctl reload nginx